<!DOCTYPE html>
<html lang="en" data-theme="light" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nike China Customer Enquiry</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --card-bg: #fff;
      --text: #111;
      --text-muted: #6b7280;
      --border: #d1d5db;
      --input-bg: #fff;
      --accent: #111;
      --accent-hover: #333;
      --accent-disabled: #9ca3af;
      --focus-ring: rgba(0,0,0,0.1);
      --shadow: rgba(0,0,0,0.06);
      --success-bg: #ecfdf5;
      --success-text: #065f46;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
      --reply-bg: #f9fafb;
      --reply-border: #e5e7eb;
      --toggle-bg: #e5e7eb;
      --toggle-knob: #fff;
      --swoosh: #111;
      --banner-bg: #111;
      --banner-text: #fff;
    }

    [data-theme="dark"] {
      --bg: #0a0a0a;
      --card-bg: #1a1a1a;
      --text: #f5f5f5;
      --text-muted: #9ca3af;
      --border: #333;
      --input-bg: #111;
      --accent: #f5f5f5;
      --accent-hover: #ddd;
      --accent-disabled: #555;
      --focus-ring: rgba(255,255,255,0.12);
      --shadow: rgba(0,0,0,0.4);
      --success-bg: #064e3b;
      --success-text: #6ee7b7;
      --error-bg: #7f1d1d;
      --error-text: #fca5a5;
      --reply-bg: #111;
      --reply-border: #333;
      --toggle-bg: #333;
      --toggle-knob: #f5f5f5;
      --swoosh: #f5f5f5;
      --banner-bg: #f5f5f5;
      --banner-text: #111;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      transition: background 0.3s, color 0.3s;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 4px 32px var(--shadow);
      width: 100%;
      max-width: 540px;
      overflow: hidden;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .banner {
      background: var(--banner-bg);
      color: var(--banner-text);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.3s, color 0.3s;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .swoosh {
      width: 48px;
      height: 20px;
    }

    .brand-text {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .lang-btn {
      background: transparent;
      border: 1.5px solid var(--banner-text);
      color: var(--banner-text);
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.2s;
    }

    .lang-btn:hover { opacity: 0.7; }

    .theme-toggle {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
    }

    .toggle-track {
      width: 36px;
      height: 20px;
      background: rgba(255,255,255,0.25);
      border-radius: 10px;
      position: relative;
      transition: background 0.3s;
    }

    [data-theme="dark"] .toggle-track { background: rgba(0,0,0,0.3); }

    .toggle-knob {
      width: 16px;
      height: 16px;
      background: var(--banner-text);
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.3s;
    }

    [data-theme="dark"] .toggle-knob { transform: translateX(16px); }

    .card-body { padding: 2rem; }

    h1 { font-size: 1.5rem; margin-bottom: 0.3rem; font-weight: 800; }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 1.6rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input, textarea, select {
      width: 100%;
      padding: 0.65rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text);
      transition: border-color 0.2s, background 0.3s, color 0.3s;
      margin-bottom: 1rem;
    }

    select { cursor: pointer; appearance: auto; }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    input:invalid:not(:placeholder-shown),
    textarea:invalid:not(:placeholder-shown) {
      border-color: #ef4444;
    }

    input::placeholder, textarea::placeholder { color: var(--text-muted); }

    textarea { resize: vertical; min-height: 100px; }

    button[type="submit"] {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: var(--card-bg);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:disabled { background: var(--accent-disabled); cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    [data-theme="dark"] .spinner {
      border-color: rgba(0,0,0,0.2);
      border-top-color: #111;
    }

    button.loading .spinner { display: inline-block; }
    button.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .message {
      text-align: center;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 1rem;
      display: none;
    }

    .message.success { display: block; background: var(--success-bg); color: var(--success-text); }
    .message.error   { display: block; background: var(--error-bg); color: var(--error-text); }

    .ai-reply {
      margin-top: 1.2rem;
      padding: 1rem;
      background: var(--reply-bg);
      border: 1px solid var(--reply-border);
      border-radius: 8px;
      display: none;
      transition: background 0.3s, border-color 0.3s;
    }

    .ai-reply.visible { display: block; }

    .ai-reply-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .ai-reply-body {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
    }

    .footer {
      text-align: center;
      padding: 1rem 2rem 1.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      transition: color 0.3s, border-color 0.3s;
    }

    .footer a {
      color: var(--text-muted);
      text-decoration: underline;
      transition: color 0.2s;
    }

    .footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="banner">
      <div class="brand">
        <svg class="swoosh" viewBox="0 0 69 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M68.56 0.95C52.8 9.92 37.56 21.37 24.12 28.03C14.68 32.83 5.54 33.15 1.68 27.27C-1.64 22.23 0.88 14.89 5.08 8.09L7.64 10.01C4.36 15.41 2.76 20.81 5.16 24.41C7.96 28.63 15.16 28.27 23.28 24.07C37.16 17.19 53.08 5.23 68.56 0.95Z" fill="currentColor"/>
        </svg>
        <span class="brand-text" data-i18n="brand">NIKE CHINA</span>
      </div>
      <div class="controls">
        <button class="lang-btn" id="langBtn">中文</button>
        <div class="theme-toggle" id="themeToggle" role="button" tabindex="0" aria-label="Toggle dark mode">
          <div class="toggle-track"><div class="toggle-knob"></div></div>
        </div>
      </div>
    </div>

    <div class="card-body">
      <h1 data-i18n="title">Nike Shoe Enquiry</h1>
      <p class="subtitle" data-i18n="subtitle">Have questions about Nike shoes in China? Ask about models, pricing, sizes, availability, and more. Our AI assistant will help you.</p>

      <form id="enquiryForm" novalidate>
        <label for="name" data-i18n="labelName">Name</label>
        <input type="text" id="name" name="name" data-i18n-ph="phName" placeholder="Your full name" required>

        <label for="email" data-i18n="labelEmail">Email</label>
        <input type="email" id="email" name="email" data-i18n-ph="phEmail" placeholder="you@example.com" required>

        <label for="tel" data-i18n="labelTel">Telephone</label>
        <input type="tel" id="tel" name="tel" data-i18n-ph="phTel" placeholder="+86 138-0000-0000" required>

        <label for="message" data-i18n="labelMessage">Message</label>
        <textarea id="message" name="message" data-i18n-ph="phMessage" placeholder="e.g. What Nike running shoes do you have under 1000 RMB in size 42?" required></textarea>

        <button type="submit">
          <span class="btn-text" data-i18n="submit">Submit Enquiry</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div id="formMessage" class="message"></div>

      <div id="aiReply" class="ai-reply">
        <div class="ai-reply-label" data-i18n="aiLabel">AI Assistant Preview</div>
        <div class="ai-reply-body" id="aiReplyBody"></div>
      </div>
    </div>
    <div class="footer" data-i18n="footer">
      Powered by <a href="https://www.tertiarycourses.com.sg/" target="_blank" rel="noopener">Tertiary Infotech Academy Pte Ltd</a>
    </div>
  </div>

  <script>
    /* ── i18n ── */
    const i18n = {
      en: {
        brand: 'NIKE CHINA',
        title: 'Nike Shoe Enquiry',
        subtitle: 'Have questions about Nike shoes in China? Ask about models, pricing, sizes, availability, and more. Our AI assistant will help you.',
        labelName: 'Name',
        phName: 'Your full name',
        labelEmail: 'Email',
        phEmail: 'you@example.com',
        labelTel: 'Telephone',
        phTel: '+86 138-0000-0000',
        labelMessage: 'Message',
        phMessage: 'e.g. What Nike running shoes do you have under 1000 RMB in size 42?',
        submit: 'Submit Enquiry',
        aiLabel: 'AI Assistant Preview',
        success: 'Thank you! Your enquiry has been received. Our team will review and respond to you via email shortly.',
        error: 'Something went wrong. Please try again later.',
        langSwitch: '中文',
        footer: ''
      },
      zh: {
        brand: '耐克中国',
        title: '耐克鞋款咨询',
        subtitle: '关于耐克鞋款有任何疑问？可以询问鞋款型号、价格、尺码、库存等信息。我们的AI助手将为您服务。',
        labelName: '姓名',
        phName: '请输入您的姓名',
        labelEmail: '电子邮箱',
        phEmail: 'you@example.com',
        labelTel: '电话号码',
        phTel: '+86 138-0000-0000',
        labelMessage: '咨询内容',
        phMessage: '例如：有哪些1000元以下的42码跑鞋？',
        submit: '提交咨询',
        aiLabel: 'AI 助手预览',
        success: '感谢您的咨询！我们的团队将审核后通过邮件回复您。',
        error: '出现了一些问题，请稍后再试。',
        langSwitch: 'EN',
        footer: ''
      }
    };

    let currentLang = localStorage.getItem('lang') || 'en';

    function setLang(lang) {
      currentLang = lang;
      document.documentElement.setAttribute('data-lang', lang);
      localStorage.setItem('lang', lang);

      const t = i18n[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] && key !== 'footer') el.textContent = t[key];
      });
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const key = el.getAttribute('data-i18n-ph');
        if (t[key]) el.placeholder = t[key];
      });

      document.getElementById('langBtn').textContent = t.langSwitch;
      document.title = lang === 'zh' ? '耐克中国 - 鞋款咨询' : 'Nike China - Shoe Enquiry';
    }

    document.getElementById('langBtn').addEventListener('click', () => {
      setLang(currentLang === 'en' ? 'zh' : 'en');
    });

    setLang(currentLang);

    /* ── Theme toggle ── */
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');

    function setTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      setTheme(savedTheme);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      setTheme('dark');
    }

    themeToggle.addEventListener('click', () => {
      setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
    themeToggle.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); themeToggle.click(); }
    });

    /* ── Form submission ── */
    const form = document.getElementById('enquiryForm');
    const btn = form.querySelector('button[type="submit"]');
    const msgEl = document.getElementById('formMessage');
    const aiReplyEl = document.getElementById('aiReply');
    const aiReplyBody = document.getElementById('aiReplyBody');

    const WEBHOOK_URL = 'https://n8n.srv923061.hstgr.cloud/webhook/6e9f66ac-e36a-417b-a755-08c3c99e9ee7';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgEl.className = 'message';
      aiReplyEl.classList.remove('visible');

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      const payload = {
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        tel: form.tel.value.trim(),
        message: form.message.value.trim(),
        language: currentLang,
      };

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!res.ok) throw new Error(`Server responded with ${res.status}`);

        let data = {};
        const text = await res.text();
        if (text) {
          try { data = JSON.parse(text); } catch (_) {}
        }

        msgEl.textContent = i18n[currentLang].success;
        msgEl.className = 'message success';

        const reply = data.output || data.text || data.response || data.message || data.reply;
        if (reply) {
          aiReplyBody.textContent = reply;
          aiReplyEl.classList.add('visible');
        }

        form.reset();
      } catch (err) {
        msgEl.textContent = i18n[currentLang].error;
        msgEl.className = 'message error';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
